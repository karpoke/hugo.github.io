baseURL = 'https://hugo.github.io/'
languageCode = 'es'
title = "Karpoke - Just Another Blog"
theme = 'PaperMod'
enableRobotsTXT = true

# Permalinks en formato legacy de Pelican: /YYYY/MM/DD/slug/
[permalinks]
  posts = '/:year/:month/:day/:slug/'

[params]
  author = 'Nacho Cano'
  description = 'Blog técnico de Nacho Cano'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  # MathJax para soporte de LaTeX/ecuaciones matemáticas
  math = true

  # Búsqueda con Fuse.js
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[params.homeInfoParams]
  Title = "Blog Técnico"
  Content = "Artículos sobre programación, desarrollo web y tecnología"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/karpoke/"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    url = "/categories/"
    weight = 15

  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20


  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 30

  [[menu.main]]
    identifier = "about"
    name = "Who am I?"
    url = "/who-am-i/"
    weight = 35

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON", "Robots"]
  section = ["HTML", "RSS"]
  term = ["HTML", "RSS"]
